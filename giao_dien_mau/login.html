<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create an Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <!-- Space canvas -->
  <canvas id="space"></canvas>

  <!-- Nebula glows -->
  <div class="nebula nebula-1"></div>
  <div class="nebula nebula-2"></div>
  <div class="nebula nebula-3"></div>

  <!-- Modal -->
  <div class="modal-wrap">
    <div class="modal">
      <h1>Create an account</h1>

      <!-- Social -->
      <div class="socials">
        <button class="btn-social">
          <!-- Google G -->
          <svg width="18" height="18" viewBox="0 0 18 18"><g><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.859-3.048.859-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/><path d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.347 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/></g></svg>
          Google
        </button>
        <button class="btn-social">
          <!-- Facebook f -->
          <svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="9" fill="#1877F2"/><path d="M12.6 11.4l.4-2.6h-2.5V7.2c0-.7.3-1.4 1.4-1.4H13V3.5s-1.1-.2-2.2-.2c-2.2 0-3.7 1.4-3.7 3.9v2.2H4.8v2.6h2.3V18c.6.1 1.1.1 1.7.1s1.1 0 1.7-.1v-6.6h2.1z" fill="#fff"/></svg>
          Facebook
        </button>
      </div>

      <!-- Divider -->
      <div class="divider">Or</div>

      <!-- Email -->
      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap">
          <input type="email" id="email" value="balamia@gmail.com" placeholder="Enter your email" />
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <div class="field-header">
          <label for="password">Password</label>
          <a href="#" class="forgot">Forgot ?</a>
        </div>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Enter your password" />
          <button class="eye-btn" onclick="togglePwd()" aria-label="Toggle password">
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- CTA -->
      <button class="btn-cta">Create account</button>

      <!-- Footer -->
      <p class="footer-link">Already Have An Account ? <a href="#">Log In</a></p>
    </div>
  </div>

  <script>
    /* ── STAR FIELD ─────────────────────────────────── */
    const canvas = document.getElementById('space');
    const ctx    = canvas.getContext('2d');

    let W, H, stars = [], trails = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', () => { resize(); initStars(); });

    function rand(a, b) { return Math.random() * (b - a) + a; }

    /* static stars */
    function initStars() {
      stars = [];
      const n = Math.floor(W * H / 2200);
      for (let i = 0; i < n; i++) {
        stars.push({
          x: rand(0, W), y: rand(0, H),
          r: rand(.2, 1.4),
          a: rand(.2, 1),
          da: rand(.002, .006) * (Math.random() < .5 ? 1 : -1)
        });
      }
      /* star clusters – dense patches */
      for (let c = 0; c < 5; c++) {
        const cx = rand(0, W), cy = rand(0, H);
        for (let i = 0; i < 60; i++) {
          stars.push({
            x: cx + rand(-80, 80), y: cy + rand(-80, 80),
            r: rand(.15, .8), a: rand(.15, .7),
            da: rand(.001, .004) * (Math.random() < .5 ? 1 : -1)
          });
        }
      }
    }

    /* shooting-star trails */
    function spawnTrail() {
      const edge = Math.random() < .5;
      trails.push({
        x:    edge ? rand(0, W) : rand(0, W * .3),
        y:    edge ? rand(0, H * .4) : rand(0, H * .3),
        vx:   rand(2.5, 5.5),
        vy:   rand(1.2, 3.0),
        len:  rand(60, 160),
        life: 1, fade: rand(.012, .022),
        width: rand(.5, 1.4)
      });
    }

    function drawStars() {
      stars.forEach(s => {
        s.a += s.da;
        if (s.a > 1 || s.a < .1) s.da *= -1;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(210,225,255,${s.a})`;
        ctx.fill();
      });
    }

    function drawTrails() {
      trails.forEach(t => {
        const grad = ctx.createLinearGradient(t.x - t.vx * t.len / 5, t.y - t.vy * t.len / 5, t.x, t.y);
        grad.addColorStop(0, `rgba(180,215,255,0)`);
        grad.addColorStop(1, `rgba(200,225,255,${t.life * .7})`);
        ctx.beginPath();
        ctx.moveTo(t.x - t.vx * t.len / 5, t.y - t.vy * t.len / 5);
        ctx.lineTo(t.x, t.y);
        ctx.strokeStyle = grad;
        ctx.lineWidth   = t.width;
        ctx.stroke();
        t.x += t.vx; t.y += t.vy; t.life -= t.fade;
      });
      trails = trails.filter(t => t.life > 0 && t.x < W + 50 && t.y < H + 50);
    }

    let frame = 0;
    function loop() {
      requestAnimationFrame(loop);
      ctx.clearRect(0, 0, W, H);
      drawStars();
      drawTrails();
      frame++;
      if (frame % 55 === 0) spawnTrail();
    }

    resize();
    initStars();
    for (let i = 0; i < 3; i++) spawnTrail();
    loop();

    /* ── PASSWORD TOGGLE ─────────────────────────── */
    function togglePwd() {
      const inp  = document.getElementById('password');
      const icon = document.getElementById('eye-icon');
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      icon.innerHTML = show
        ? `<line x1="1" y1="1" x2="23" y2="23"/><path d="M10.73 5.08A10.43 10.43 0 0112 5c7 0 11 7 11 7a13.16 13.16 0 01-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 001 12s4 7 11 7a9.74 9.74 0 005.39-1.61"/><circle cx="12" cy="12" r="3"/>`
        : `<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/>`;
    }
  </script>
</body>
</html>
